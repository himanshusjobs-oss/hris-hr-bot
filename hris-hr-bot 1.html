<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HRis — HR AI Assistant | Himanshu Sharma</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f3ef;
    --surface: #ffffff;
    --surface2: #f8f7f4;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9b9b96;
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-mid: #5DCAA5;
    --green-dark: #0F6E56;
    --green-deeper: #085041;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-pill: 100px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    color: var(--text);
  }

  /* ── Header ── */
  .page-header {
    width: 100%;
    max-width: 680px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-logo {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--green); display: flex; align-items: center; justify-content: center;
  }
  .brand-logo svg { width: 20px; height: 20px; }
  .brand-name { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .brand-name span { color: var(--green); }
  .badge {
    font-size: 11px; font-weight: 500; padding: 4px 10px;
    background: var(--green-light); color: var(--green-dark);
    border-radius: var(--radius-pill); border: 1px solid rgba(29,158,117,0.2);
  }
  .by-line {
    font-size: 11px; color: var(--text3);
    display: flex; align-items: center; gap: 4px;
  }
  .by-line a { color: var(--green); text-decoration: none; font-weight: 500; }

  /* ── Chat card ── */
  #bot-wrap {
    width: 100%; max-width: 680px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: flex; flex-direction: column;
    height: 600px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  /* ── Bot header ── */
  #bot-header {
    padding: 14px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  #bot-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--green-light);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  #bot-avatar svg { width: 20px; height: 20px; }
  #bot-title { font-size: 14px; font-weight: 600; color: var(--text); }
  #bot-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .status-row { margin-left: auto; display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
  .status-label { font-size: 11px; color: var(--text2); }

  /* ── Category bar ── */
  #category-bar {
    padding: 10px 16px;
    display: flex; gap: 6px; overflow-x: auto;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    scrollbar-width: none; flex-shrink: 0;
  }
  #category-bar::-webkit-scrollbar { display: none; }
  .cat-btn {
    font-size: 11px; font-weight: 500; padding: 5px 12px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border2);
    background: transparent; color: var(--text2);
    cursor: pointer; white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .cat-btn.active, .cat-btn:hover {
    background: var(--green-light); color: var(--green-dark);
    border-color: rgba(29,158,117,0.35);
  }

  /* ── Chat area ── */
  #chat-area {
    flex: 1; overflow-y: auto; padding: 18px 16px;
    display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
  }
  #chat-area::-webkit-scrollbar { width: 4px; }
  #chat-area::-webkit-scrollbar-track { background: transparent; }
  #chat-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .msg { display: flex; gap: 8px; align-items: flex-start; max-width: 86%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot { align-self: flex-start; }

  .msg-icon {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 10px; font-weight: 600; margin-top: 2px;
  }
  .bot .msg-icon { background: var(--green-light); color: var(--green-dark); }
  .user .msg-icon { background: var(--green-deeper); color: #9FE1CB; }

  .msg-bubble {
    padding: 10px 14px; border-radius: 14px;
    font-size: 13px; line-height: 1.65;
  }
  .bot .msg-bubble {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .user .msg-bubble {
    background: var(--green); color: #fff;
    border-bottom-right-radius: 4px;
  }

  /* typing indicator */
  .typing {
    display: flex; align-items: center; gap: 4px;
    padding: 12px 14px;
    background: var(--surface2); border-radius: 14px;
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
    width: fit-content;
  }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green-mid);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* ── Quick chips ── */
  #chips-wrap {
    padding: 0 16px 12px;
    display: flex; flex-wrap: wrap; gap: 6px;
    flex-shrink: 0;
  }
  .chip {
    font-size: 12px; font-weight: 400;
    padding: 6px 12px; border-radius: var(--radius-pill);
    border: 1px solid var(--border2);
    background: var(--surface); color: var(--text2);
    cursor: pointer; transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }
  .chip:hover {
    background: var(--green-light); color: var(--green-dark);
    border-color: rgba(29,158,117,0.35);
  }

  /* ── Input row ── */
  #input-row {
    padding: 12px 16px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; background: var(--surface); flex-shrink: 0;
  }
  #msg-input {
    flex: 1; font-size: 13px; padding: 9px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--surface2); color: var(--text);
    outline: none; font-family: 'DM Sans', sans-serif;
    height: 40px; transition: border-color 0.15s;
  }
  #msg-input:focus { border-color: var(--green); }
  #msg-input::placeholder { color: var(--text3); }
  #send-btn {
    width: 40px; height: 40px; border-radius: var(--radius-sm);
    background: var(--green); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s;
  }
  #send-btn:hover { background: var(--green-dark); }
  #send-btn:active { transform: scale(0.96); }
  #send-btn svg { width: 16px; height: 16px; }

  /* ── Footer ── */
  .page-footer {
    width: 100%; max-width: 680px;
    margin-top: 16px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
  }
  .footer-note { font-size: 11px; color: var(--text3); }
  .footer-note a { color: var(--green); text-decoration: none; }
  .topics {
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .topic-tag {
    font-size: 10px; padding: 3px 8px; border-radius: var(--radius-pill);
    background: var(--surface2); color: var(--text3);
    border: 1px solid var(--border);
  }

  @media (max-width: 480px) {
    body { padding: 16px 12px 32px; }
    #bot-wrap { height: calc(100vh - 180px); }
    .page-header { flex-wrap: wrap; gap: 8px; }
  }
</style>
</head>

<main id="bot-wrap" role="main" aria-label="HR AI Assistant Chat">

  <div id="bot-header">

</main>

<footer class="page-footer">
  <p class="footer-note">
    Built as part of <a href="https://linkedin.com/in/himas23" target="_blank">Himanshu Sharma's</a> HR portfolio · Demonstrating AI in HR

  <div class="topics">

const CHIPS = {
  all: ['How do I apply for leave?', 'What is my PF contribution?', 'When is salary credited?', 'What documents are needed for joining?', 'How do I resign?', 'What is the POSH policy?'],
  leave: ['How do I apply for leave?', 'What is casual leave?', 'How many sick leaves do I get?', 'What is comp off?', 'Can I work from home?', 'What is privilege leave?'],

};

let currentCat = 'all';
const chatArea = document.getElementById('chat-area');
const chipsWrap = document.getElementById('chips-wrap');

function addMsg(text, isUser) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (isUser ? 'user' : 'bot');
  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = isUser ? 'You' : 'HR';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  if (isUser) {
    wrap.appendChild(icon); wrap.appendChild(bubble);
  } else {
    wrap.appendChild(icon); wrap.appendChild(bubble);
  }
  chatArea.appendChild(wrap);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot'; wrap.id = 'typing-msg';
  const icon = document.createElement('div');
  icon.className = 'msg-icon'; icon.textContent = 'HR';
  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(icon); wrap.appendChild(t);
  chatArea.appendChild(wrap);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-msg');
  if (t) t.remove();
}

function renderChips(cat) {
  chipsWrap.innerHTML = '';
  (CHIPS[cat] || CHIPS.all).forEach(q => {
    const c = document.createElement('button');
    c.className = 'chip'; c.textContent = q;
    c.onclick = () => handleQuery(q);
    chipsWrap.appendChild(c);
  });
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderChips(cat);
}

function findAnswer(query) {
  const q = query.toLowerCase();
  for (const cat of Object.values(KB)) {
    for (const [key, answer] of Object.entries(cat.responses)) {
      if (q.includes(key) || key.split(' ').every(w => q.includes(w))) return answer;
    }
  }
  for (const cat of Object.values(KB)) {
    if (cat.keywords.some(k => q.includes(k))) {
      const keys = Object.keys(cat.responses);
      return cat.responses[keys[0]];
    }
  }
  return null;
}

function handleQuery(query) {
  addMsg(query, true);
  chipsWrap.innerHTML = '';
  showTyping();
  setTimeout(() => {
    removeTyping();
    const answer = findAnswer(query);
    addMsg(answer || "I don't have a specific answer for that just yet. For personalised help, please reach out to HR at hr@company.com or raise a ticket on the HRMS portal. I'm always learning!", false);
    setTimeout(() => renderChips(currentCat), 300);
  }, 900);
}

function sendMsg() {
  const input = document.getElementById('msg-input');
  const val = input.value.trim();
  if (!val) return;
  input.value = '';
  handleQuery(val);
}

addMsg("Hi there! I'm HRis, your AI-powered HR assistant. I can help with leave policies, payroll, onboarding, offboarding, company policies, and employee engagement. What can I help you with today?", false);
renderChips('all');
</script>
